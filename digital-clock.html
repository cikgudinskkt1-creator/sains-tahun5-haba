<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .clock-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
        }

        .timezone-name {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .timezone-info {
            font-size: 0.9em;
            color: #888;
            margin-bottom: 15px;
        }

        .digital-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 2.5em;
            font-weight: bold;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            letter-spacing: 2px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .time-details {
            font-size: 0.95em;
            color: #555;
            line-height: 1.8;
        }

        .date-display {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .day-display {
            color: #764ba2;
            margin-bottom: 5px;
        }

        .offset-display {
            color: #888;
            font-size: 0.85em;
        }

        .controls {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .controls h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.3em;
        }

        .control-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        .control-group label {
            color: #555;
            font-weight: bold;
            display: flex;
            align-items: center;
        }

        select {
            padding: 10px 15px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            background: white;
            color: #333;
        }

        select:focus {
            outline: none;
            box-shadow: 0 0 5px #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-add {
            background: #667eea;
            color: white;
        }

        .btn-add:hover {
            background: #5568d3;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-remove {
            background: #ff6b6b;
            color: white;
        }

        .btn-remove:hover {
            background: #ee5a52;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .btn-reset {
            background: #ffa502;
            color: white;
        }

        .btn-reset:hover {
            background: #e89500;
            box-shadow: 0 5px 15px rgba(255, 165, 2, 0.4);
        }

        .empty-message {
            text-align: center;
            color: #999;
            font-size: 1.1em;
            padding: 40px;
        }

        .format-toggle {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .toggle-btn {
            padding: 8px 15px;
            background: #f0f0f0;
            border: 2px solid #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: #667eea;
            transition: all 0.3s ease;
        }

        .toggle-btn.active {
            background: #667eea;
            color: white;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            opacity: 0.8;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .digital-display {
                font-size: 1.8em;
            }

            .clocks-grid {
                grid-template-columns: 1fr;
            }

            .control-group {
                flex-direction: column;
            }

            .button-group {
                flex-direction: column;
            }

            select, button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🌍 Digital Clock - Time Zones</h1>
        <p class="subtitle">Track time across the world in real-time</p>
    </header>

    <div class="controls">
        <h2>⚙️ Add Time Zones</h2>
        <div class="control-group">
            <label for="timezoneSelect">Select Timezone:</label>
            <select id="timezoneSelect">
                <option value="">-- Choose a timezone --</option>
            </select>
            <button class="btn-add" onclick="addTimezone()">+ Add Clock</button>
            <button class="btn-reset" onclick="resetToDefault()">Reset to Default</button>
        </div>

        <div class="control-group">
            <label for="formatToggle" class="format-toggle">
                Time Format:
                <button class="toggle-btn active" onclick="setFormat('12')">12 Hour</button>
                <button class="toggle-btn" onclick="setFormat('24')">24 Hour</button>
            </label>
        </div>
    </div>

    <div class="clocks-grid" id="clocksContainer">
        <!-- Clocks will be generated here -->
    </div>

    <div class="footer">
        <p>💡 Click on any timezone card to remove it | Time updates every second</p>
    </div>
</div>

<script>
    // List of all timezones
    const allTimezones = [
        { name: 'UTC (Coordinated Universal Time)', value: 'UTC' },
        { name: 'GMT (Greenwich Mean Time)', value: 'Europe/London' },
        { name: 'EST (Eastern Standard Time)', value: 'America/New_York' },
        { name: 'CST (Central Standard Time)', value: 'America/Chicago' },
        { name: 'MST (Mountain Standard Time)', value: 'America/Denver' },
        { name: 'PST (Pacific Standard Time)', value: 'America/Los_Angeles' },
        { name: 'CET (Central European Time)', value: 'Europe/Paris' },
        { name: 'IST (India Standard Time)', value: 'Asia/Kolkata' },
        { name: 'JST (Japan Standard Time)', value: 'Asia/Tokyo' },
        { name: 'AEST (Australian Eastern Time)', value: 'Australia/Sydney' },
        { name: 'NZST (New Zealand Standard Time)', value: 'Pacific/Auckland' },
        { name: 'SGT (Singapore Time)', value: 'Asia/Singapore' },
        { name: 'HKT (Hong Kong Time)', value: 'Asia/Hong_Kong' },
        { name: 'GST (Gulf Standard Time)', value: 'Asia/Dubai' },
        { name: 'PKT (Pakistan Standard Time)', value: 'Asia/Karachi' },
        { name: 'BDT (Bangladesh Time)', value: 'Asia/Dhaka' },
        { name: 'ICT (Indochina Time)', value: 'Asia/Bangkok' },
        { name: 'MYT (Malaysia Time)', value: 'Asia/Kuala_Lumpur' },
        { name: 'WIB (Western Indonesia Time)', value: 'Asia/Jakarta' },
        { name: 'PHT (Philippine Time)', value: 'Asia/Manila' },
        { name: 'AEDT (Australian Eastern Daylight Time)', value: 'Australia/Melbourne' },
        { name: 'NZDT (New Zealand Daylight Time)', value: 'Pacific/Auckland' },
        { name: 'WET (Western European Time)', value: 'Europe/Lisbon' },
        { name: 'WEST (Western European Summer Time)', value: 'Europe/Lisbon' },
        { name: 'EET (Eastern European Time)', value: 'Europe/Athens' },
        { name: 'IST (Irish Standard Time)', value: 'Europe/Dublin' },
        { name: 'ACT (Australia Central Time)', value: 'Australia/Adelaide' },
        { name: 'AKST (Alaska Standard Time)', value: 'America/Anchorage' },
        { name: 'HST (Hawaii-Aleutian Standard Time)', value: 'Pacific/Honolulu' },
        { name: 'AST (Atlantic Standard Time)', value: 'America/Halifax' },
        { name: 'BRT (Brasília Time)', value: 'America/Sao_Paulo' },
        { name: 'ART (Argentina Time)', value: 'America/Argentina/Buenos_Aires' },
        { name: 'CAT (Central Africa Time)', value: 'Africa/Johannesburg' },
        { name: 'EAT (East Africa Time)', value: 'Africa/Nairobi' },
        { name: 'WAT (West Africa Time)', value: 'Africa/Lagos' },
        { name: 'MSK (Moscow Standard Time)', value: 'Europe/Moscow' },
        { name: 'AZODT (Azores Time)', value: 'Atlantic/Azores' },
        { name: 'CVST (Cape Verde Standard Time)', value: 'Atlantic/Cape_Verde' }
    ];

    let activeTimezones = [];
    let timeFormat = '12'; // 12 or 24 hour format

    // Initialize timezone select
    function initializeTimezoneSelect() {
        const select = document.getElementById('timezoneSelect');
        allTimezones.forEach(tz => {
            const option = document.createElement('option');
            option.value = tz.value;
            option.textContent = tz.name;
            select.appendChild(option);
        });
    }

    // Add timezone to active list
    function addTimezone() {
        const select = document.getElementById('timezoneSelect');
        const value = select.value;
        
        if (!value) {
            alert('Please select a timezone');
            return;
        }

        if (activeTimezones.some(tz => tz.value === value)) {
            alert('This timezone is already added');
            return;
        }

        const timezone = allTimezones.find(tz => tz.value === value);
        activeTimezones.push(timezone);
        updateClocks();
        select.value = '';
    }

    // Remove timezone
    function removeTimezone(value) {
        activeTimezones = activeTimezones.filter(tz => tz.value !== value);
        updateClocks();
    }

    // Reset to default timezones
    function resetToDefault() {
        activeTimezones = [
            { name: 'UTC (Coordinated Universal Time)', value: 'UTC' },
            { name: 'EST (Eastern Standard Time)', value: 'America/New_York' },
            { name: 'IST (India Standard Time)', value: 'Asia/Kolkata' },
            { name: 'JST (Japan Standard Time)', value: 'Asia/Tokyo' }
        ];
        updateClocks();
    }

    // Set time format
    function setFormat(format) {
        timeFormat = format;
        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        event.target.classList.add('active');
        updateClocks();
    }

    // Get current time in timezone
    function getTimeInTimezone(timezone) {
        const now = new Date();
        const formatter = new Intl.DateTimeFormat('en-US', {
            timeZone: timezone,
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: timeFormat === '12'
        });

        const parts = formatter.formatToParts(now);
        const result = {};
        
        parts.forEach(part => {
            if (part.type !== 'literal') {
                result[part.type] = part.value;
            }
        });

        return result;
    }

    // Get timezone offset
    function getTimezoneOffset(timezone) {
        const now = new Date();
        const utcDate = new Date(now.toLocaleString('en-US', { timeZone: 'UTC' }));
        const tzDate = new Date(now.toLocaleString('en-US', { timeZone: timezone }));
        const offsetMinutes = (tzDate - utcDate) / (1000 * 60);
        const offsetHours = Math.floor(offsetMinutes / 60);
        const offsetMins = Math.abs(offsetMinutes % 60);
        const sign = offsetHours >= 0 ? '+' : '';
        return `${sign}${offsetHours}:${String(offsetMins).padStart(2, '0')}`;
    }

    // Get day name
    function getDayName(timezone) {
        const now = new Date();
        const formatter = new Intl.DateTimeFormat('en-US', {
            timeZone: timezone,
            weekday: 'long'
        });
        return formatter.format(now);
    }

    // Update all clocks
    function updateClocks() {
        const container = document.getElementById('clocksContainer');
        
        if (activeTimezones.length === 0) {
            container.innerHTML = '<div class="empty-message">No timezones selected. Add one to get started!</div>';
            return;
        }

        container.innerHTML = activeTimezones.map(tz => {
            const time = getTimeInTimezone(tz.value);
            const offset = getTimezoneOffset(tz.value);
            const day = getDayName(tz.value);
            const displayTime = `${String(time.hour).padStart(2, '0')}:${time.minute}:${time.second}`;
            const date = `${time.month}/${time.day}/${time.year}`;

            return `
                <div class="clock-card" onclick="removeTimezone('${tz.value}')" style="cursor: pointer;">
                    <div class="timezone-name">${tz.name.split('(')[0].trim()}</div>
                    <div class="timezone-info">${tz.name}</div>
                    <div class="digital-display">${displayTime}</div>
                    <div class="time-details">
                        <div class="date-display">${date}</div>
                        <div class="day-display">${day}</div>
                        <div class="offset-display">UTC ${offset}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // Update clocks every second
    setInterval(updateClocks, 1000);

    // Initialize
    initializeTimezoneSelect();
    resetToDefault();
</script>

</body>
</html>
