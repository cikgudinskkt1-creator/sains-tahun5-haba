<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }

        .joke-display {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 25px;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .joke-type {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .joke-content {
            color: white;
            font-size: 1.3em;
            line-height: 1.6;
            font-weight: 500;
        }

        .joke-setup {
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .joke-punchline {
            margin-top: 20px;
            font-size: 1.1em;
            font-style: italic;
            opacity: 0.95;
        }

        .loading {
            text-align: center;
            color: #f5576c;
            font-size: 1.1em;
        }

        .spinner {
            border: 3px solid #f0f0f0;
            border-top: 3px solid #f5576c;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 25px;
        }

        button {
            padding: 14px 28px;
            font-size: 1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-generate {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            flex: 1;
            min-width: 200px;
        }

        .btn-generate:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(245, 87, 108, 0.4);
        }

        .btn-generate:active {
            transform: translateY(-1px);
        }

        .btn-copy {
            background: #e8e8e8;
            color: #333;
            min-width: 120px;
        }

        .btn-copy:hover {
            background: #d0d0d0;
            transform: translateY(-3px);
        }

        .btn-share {
            background: #4267B2;
            color: white;
            min-width: 120px;
        }

        .btn-share:hover {
            background: #2d4a7f;
            transform: translateY(-3px);
        }

        .filters {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
        }

        .filter-label {
            color: #333;
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }

        .filter-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 15px;
            border: 2px solid #f5576c;
            background: white;
            color: #f5576c;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .filter-btn.active {
            background: #f5576c;
            color: white;
        }

        .filter-btn:hover {
            background: #f5576c;
            color: white;
        }

        .joke-counter {
            text-align: center;
            color: #666;
            font-size: 0.95em;
            margin-bottom: 15px;
        }

        .joke-counter strong {
            color: #f5576c;
            font-size: 1.1em;
        }

        .copy-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #f5576c;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
        }

        .footer {
            text-align: center;
            color: white;
            opacity: 0.9;
            font-size: 0.9em;
        }

        .footer a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            display: none;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .main-card {
                padding: 25px;
            }

            .joke-content {
                font-size: 1.1em;
            }

            .controls {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .filter-options {
                justify-content: center;
            }
        }

        .dark-mode-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .dark-mode-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        body.dark-mode .main-card {
            background: #0f3460;
            color: white;
        }

        body.dark-mode .joke-display {
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            color: white;
        }

        body.dark-mode .filters {
            background: #16213e;
        }

        body.dark-mode .filter-label {
            color: white;
        }

        body.dark-mode .filter-btn {
            border-color: #e94560;
            color: #e94560;
            background: #0f3460;
        }

        body.dark-mode .filter-btn.active {
            background: #e94560;
            color: white;
        }

        body.dark-mode .joke-counter {
            color: #aaa;
        }

        body.dark-mode .stats {
            background: #16213e;
        }

        body.dark-mode .stat-item {
            background: #0f3460;
            color: white;
        }

        body.dark-mode header {
            color: white;
        }
    </style>
</head>
<body>

<button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>

<div class="container">
    <header>
        <h1>😂 Joke Generator</h1>
        <p class="subtitle">Laugh with randomly generated jokes!</p>
    </header>

    <div class="main-card">
        <div class="error-message" id="errorMessage"></div>

        <div class="filters">
            <label class="filter-label">Select Joke Type:</label>
            <div class="filter-options">
                <button class="filter-btn active" onclick="setJokeType('any')">Any</button>
                <button class="filter-btn" onclick="setJokeType('general')">General</button>
                <button class="filter-btn" onclick="setJokeType('programming')">Programming</button>
                <button class="filter-btn" onclick="setJokeType('knock-knock')">Knock-Knock</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="jokeCount">0</div>
                <div class="stat-label">Jokes Loaded</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="favoriteCount">0</div>
                <div class="stat-label">Favorites</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="shareCount">0</div>
                <div class="stat-label">Shares</div>
            </div>
        </div>

        <div class="joke-counter">
            Loaded <strong id="totalJokes">0</strong> total jokes
        </div>

        <div class="joke-display" id="jokeDisplay">
            <div class="loading">
                <p>Click "Get Joke" to start laughing! 😄</p>
            </div>
        </div>

        <div class="controls">
            <button class="btn-generate" onclick="getJoke()">🎲 Get Joke</button>
            <button class="btn-copy" onclick="copyJoke()">📋 Copy</button>
            <button class="btn-share" onclick="shareJoke()">📤 Share</button>
        </div>
    </div>

    <div class="footer">
        <p>Powered by <a href="https://official-joke-api.appspot.com/" target="_blank">Official Joke API</a></p>
        <p>© 2026 Joke Generator | Made with 💜 for Laughter</p>
    </div>
</div>

<div class="copy-notification" id="copyNotification">
    ✓ Joke copied to clipboard!
</div>

<script>
    let currentJoke = null;
    let jokeCount = 0;
    let favoriteCount = 0;
    let shareCount = 0;
    let selectedType = 'any';

    // Initialize favorites from localStorage
    function initializeFavorites() {
        const stored = localStorage.getItem('favoriteCount');
        if (stored) {
            favoriteCount = parseInt(stored);
            document.getElementById('favoriteCount').textContent = favoriteCount;
        }
        
        const storedShares = localStorage.getItem('shareCount');
        if (storedShares) {
            shareCount = parseInt(storedShares);
            document.getElementById('shareCount').textContent = shareCount;
        }
    }

    // Set joke type filter
    function setJokeType(type) {
        selectedType = type;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        event.target.classList.add('active');
    }

    // Get joke from API
    async function getJoke() {
        const jokeDisplay = document.getElementById('jokeDisplay');
        const errorMessage = document.getElementById('errorMessage');
        
        try {
            errorMessage.style.display = 'none';
            jokeDisplay.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading joke...</p></div>';

            let url = 'https://official-joke-api.appspot.com/random_joke';
            
            if (selectedType !== 'any') {
                url = `https://official-joke-api.appspot.com/jokes/${selectedType}/random`;
            }

            const response = await fetch(url);
            
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const data = await response.json();
            
            // Handle array response (when getting specific type)
            const joke = Array.isArray(data) ? data[0] : data;
            
            currentJoke = joke;
            jokeCount++;
            
            displayJoke(joke);
            updateStats();
            
        } catch (error) {
            console.error('Error fetching joke:', error);
            jokeDisplay.innerHTML = '<div class="loading"><p>😕 Failed to load joke. Please try again.</p></div>';
            errorMessage.textContent = `Error: ${error.message}`;
            errorMessage.style.display = 'block';
        }
    }

    // Display joke on screen
    function displayJoke(joke) {
        const jokeDisplay = document.getElementById('jokeDisplay');
        
        const jokeType = joke.type ? joke.type.replace('-', ' ').toUpperCase() : 'GENERAL';
        
        if (joke.setup && joke.punchline) {
            jokeDisplay.innerHTML = `
                <div class="joke-type">${jokeType}</div>
                <div class="joke-content">
                    <div class="joke-setup">${escapeHtml(joke.setup)}</div>
                    <div class="joke-punchline">${escapeHtml(joke.punchline)}</div>
                </div>
            `;
        } else if (joke.joke) {
            jokeDisplay.innerHTML = `
                <div class="joke-type">${jokeType}</div>
                <div class="joke-content">${escapeHtml(joke.joke)}</div>
            `;
        }
    }

    // Copy joke to clipboard
    function copyJoke() {
        if (!currentJoke) {
            alert('Please load a joke first!');
            return;
        }

        let text = '';
        if (currentJoke.setup && currentJoke.punchline) {
            text = `${currentJoke.setup}\n${currentJoke.punchline}`;
        } else {
            text = currentJoke.joke;
        }

        navigator.clipboard.writeText(text).then(() => {
            showNotification('copy');
        }).catch(err => {
            console.error('Failed to copy:', err);
            alert('Failed to copy joke');
        });
    }

    // Share joke
    function shareJoke() {
        if (!currentJoke) {
            alert('Please load a joke first!');
            return;
        }

        let text = '';
        if (currentJoke.setup && currentJoke.punchline) {
            text = `${currentJoke.setup}\n${currentJoke.punchline}`;
        } else {
            text = currentJoke.joke;
        }

        if (navigator.share) {
            navigator.share({
                title: '😂 Check out this joke!',
                text: text,
            }).then(() => {
                shareCount++;
                localStorage.setItem('shareCount', shareCount);
                document.getElementById('shareCount').textContent = shareCount;
                showNotification('share');
            }).catch(err => console.error('Error sharing:', err));
        } else {
            // Fallback: Copy to clipboard
            copyJoke();
            alert('Joke copied! Share it with your friends! 😂');
        }
    }

    // Show notification
    function showNotification(type) {
        const notification = document.getElementById('copyNotification');
        if (type === 'copy') {
            notification.textContent = '✓ Joke copied to clipboard!';
        } else {
            notification.textContent = '✓ Joke shared!';
        }
        notification.style.display = 'block';
        setTimeout(() => {
            notification.style.display = 'none';
        }, 3000);
    }

    // Update statistics
    function updateStats() {
        document.getElementById('jokeCount').textContent = jokeCount;
        document.getElementById('totalJokes').textContent = jokeCount;
    }

    // Toggle dark mode
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
    }

    // Load dark mode preference
    function loadDarkModePreference() {
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }
    }

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
        const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        };
        return text.replace(/[&<>"']/g, m => map[m]);
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            getJoke();
        }
        if (e.ctrlKey && e.code === 'KeyC') {
            e.preventDefault();
            copyJoke();
        }
    });

    // Initialize on load
    window.addEventListener('load', () => {
        initializeFavorites();
        loadDarkModePreference();
    });
</script>

</body>
</html>
